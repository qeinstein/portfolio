    <script>
      const redirectPath = sessionStorage.getItem("portfolio_redirect_path");

      if (redirectPath) {
        sessionStorage.removeItem("portfolio_redirect_path");
        window.history.replaceState(null, "", redirectPath);
      }

      const savedTheme = localStorage.getItem("theme");
      const validThemes = new Set([
        "one-dark-pro-night-flat",
        "vscode-dark",
        "vscode-light",
        "github-dark",
        "nord",
        "monokai"
      ]);
      document.documentElement.dataset.theme = validThemes.has(savedTheme)
        ? savedTheme
        : "one-dark-pro-night-flat";
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
